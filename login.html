<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schultz'sches Nachschlagewerk - Autorisierung</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            --clr-primary: #c4a47c; 
            --clr-bg: #1a1a1a;
            --clr-panel: #252525;
            --font-main: 'Georgia', serif;
        }

        body {
            background-color: var(--clr-bg);
            color: var(--clr-primary);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }


        .login-card {
            background-color: var(--clr-panel);
            border: 2px solid var(--clr-primary);
            padding: 50px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

   
        .login-card::before, .login-card::after {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(196, 164, 124, 0.2);
            pointer-events: none;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--clr-primary);
            padding-bottom: 15px;
        }

        p {
            font-style: italic;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        input {
            background: #111;
            border: 1px solid var(--clr-primary);
            color: white;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        button {
            background-color: var(--clr-primary);
            color: #1a1a1a;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            background-color: #e2c094;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196, 164, 124, 0.3);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="login-card">
        <h1>Autorisierung</h1>
        <p>Eigentum von Dr. Schultz.<br>Unbefugtes Lesen ist strengstens untersagt.</p>
        
        <input type="password" id="pwField" placeholder="Kennwort eingeben...">
        <button onclick="check()">Eintreten</button>

        <div class="footer-note">@2026 Back To Hardcore Medic-RP</div>
    </div>

<script>
    function check() {

        var eingabe = document.getElementById("pwField").value.trim().toLowerCase();
        
        
        var passwortKorrekt = "preussen.schultz";
        
        if(eingabe === passwortKorrekt) {

            sessionStorage.setItem("rp_access", "true");

            window.location.href = "index.html"; 
        } else {
            alert("Zugriff verweigert. Die Kanzlei Schultz wurde informiert.");
        }
    }


    document.getElementById("pwField").addEventListener("keypress", function(e) {
        if (e.key === "Enter") { check(); }
    });
</script>
</body>
</html>
